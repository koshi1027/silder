<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Directors | Marquee Hover Preview</title>

  <style>
    :root {
      --bg: #000;
      --text: #fff;
      --muted-text: rgba(255, 255, 255, .2);
      --active-text: #fff;
      --header-h: 112px;
      --speed-top: 58s;
      --speed-middle: 64s;
      --speed-bottom: 60s;
      --ease: cubic-bezier(.22, 1, .36, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background: var(--bg);
    }



    /* Header */
    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 30;
      width: 100%;
      height: var(--header-h);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
      padding: 42px 76px 0;
      pointer-events: none;
    }

    .logo,
    .main-nav {
      pointer-events: auto;
    }

    .logo {
      grid-column: 1;
      justify-self: center;
      display: inline-flex;
      align-items: center;
      font-size: clamp(28px, 2.35vw, 42px);
      font-weight: 900;
      letter-spacing: -0.08em;
      line-height: 1;
      color: #191919;
      transform: translateX(8vw);
    }

    .logo span {
      display: inline-block;
    }

    .logo .yellow {
      color: #f4d800;
    }

    .logo .blue {
      color: #63a7ff;
    }

    .logo .pink {
      color: #ff4f9b;
    }

    .main-nav {
      grid-column: 3;
      justify-self: center;
      display: flex;
      gap: 70px;
      padding-top: 3px;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: -.02em;
      color: #000;
    }

    .main-nav a {
      position: relative;
      padding-bottom: 4px;
    }

    .main-nav a.is-active::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 1px;
      background: currentColor;
    }

    body.is-hovering .main-nav,
    body.is-hovering .logo {
      color: #111;
    }

    /* Marquee */
    .marquee-wrap {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 36px;
      padding-top: var(--header-h);
      mix-blend-mode: normal;
    }

    .marquee-row {
      width: 100%;
      overflow: visible;
      white-space: nowrap;
    }

    .track {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      will-change: transform;
      color: var(--text);
    }

    .group {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
    }

    .director-link,
    .sep {
      display: inline-block;
      font-size: clamp(64px, 6.35vw, 124px);
      font-weight: 800;
      letter-spacing: -0.065em;
      line-height: .9;
      color: currentColor;
    }

    .director-link {
      margin: 0 28px;
      cursor: pointer;
      transition:
        color .35s var(--ease),
        opacity .35s var(--ease),
        transform .35s var(--ease);
    }

    .director-link img {
      height: clamp(64px, 6.35vw, 124px);
      width: auto;
      object-fit: cover;
      vertical-align: middle;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      transition: transform .35s var(--ease);
    }

    .director-link:hover img {
      transform: scale(1.05);
    }

    /* 懸停時換圖樣式 */
    .director-link .img-hover {
      display: none;
    }

    .director-link.has-hover:hover .img-default {
      display: none;
    }

    .director-link.has-hover:hover .img-hover {
      display: inline-block;
    }

    .sep {
      margin: 0 9px;
      font-weight: 400;
      letter-spacing: -.08em;
      vertical-align: middle;
      transition: opacity .35s var(--ease);
    }

    body.is-hovering .track {
      color: var(--muted-text);
    }

    body.is-hovering .director-link {
      opacity: 0;
    }

    body.is-hovering .director-link.is-active {
      color: var(--active-text);
      opacity: 1;
      transform: translateY(-2px);
      text-shadow: 0 8px 26px rgba(0, 0, 0, .16);
    }

    body.is-hovering .sep {
      opacity: 0;
    }

    .move-left {
      animation: moveLeft linear infinite;
    }

    .move-right {
      animation: moveRight linear infinite;
    }

    .speed-top {
      animation-duration: var(--speed-top);
    }

    .speed-middle {
      animation-duration: var(--speed-middle);
    }

    .speed-bottom {
      animation-duration: var(--speed-bottom);
    }

    @keyframes moveLeft {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-50%);
      }
    }

    @keyframes moveRight {
      from {
        transform: translateX(-50%);
      }

      to {
        transform: translateX(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .track {
        animation: none !important;
      }
    }

    @media (max-width: 900px) {
      :root {
        --header-h: 120px;
      }

      .site-header {
        height: auto;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        padding: 28px 24px 0;
      }

      .logo {
        transform: none;
        font-size: 30px;
      }

      .main-nav {
        gap: 22px;
        font-size: 13px;
      }

      .marquee-wrap {
        gap: 24px;
      }

      .director-link,
      .sep {
        font-size: clamp(46px, 14vw, 82px);
      }

      .director-link {
        margin: 0 18px;
      }
    }

    /* 懸停背景圖樣式 */
    .hover-bg-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1; /* 高於原本背景，但低於 marquee-wrap */
      pointer-events: none;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.6s var(--ease);
    }

    .hover-bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform: scale(1.08);
      transition: transform 0.6s var(--ease);
      filter: blur(4px); /* 微弱模糊，提升視覺電影感並保護文字可讀性 */
    }

    .hover-bg-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6); /* 暗色遮罩保護前景色 */
    }

    /* 當 body 處於懸停狀態時 */
    body.is-hovering .hover-bg-container {
      opacity: 1;
    }

    body.is-hovering .hover-bg-image {
      transform: scale(1);
    }
  </style>
</head>

<body>
  <div class="page">
    <!-- 懸停背景圖容器 -->
    <div class="hover-bg-container">
      <div class="hover-bg-image"></div>
      <div class="hover-bg-overlay"></div>
    </div>


    <!-- <header class="site-header">
      <a class="logo" href="#" aria-label="PHENOMENA">
        <span>P</span><span class="yellow">H</span><span>E</span><span>N</span><span class="blue">O</span><span>M</span><span>E</span><span class="pink">N</span><span>A</span>
      </a>

      <nav class="main-nav" aria-label="Primary navigation">
        <a href="#">Home</a>
        <a class="is-active" href="#">Directors</a>
        <a href="#">Info</a>
      </nav>
    </header> -->

    <main class="marquee-wrap" aria-label="Directors">
      <!-- 上排：往右 -->
      <section class="marquee-row">
        <div class="track move-right speed-top"></div>
      </section>

      <!-- 中排：往左 -->
      <section class="marquee-row">
        <div class="track move-left speed-middle"></div>
      </section>

      <!-- 下排：往右 -->
      <section class="marquee-row">
        <div class="track move-right speed-bottom"></div>
      </section>
    </main>
  </div>

  <script>
    // ==========================================
    // 【圖片資料庫設定說明（後續要更改圖請修改此處）】
    // ==========================================
    // 若後續要更改跑馬燈圖片、新增圖片、設定懸停圖片或變更點擊連結，請直接編輯下方 imagesData 陣列項目。
    //
    // 每個圖片物件包含以下屬性：
    //   1. name:     圖片的唯一識別名稱（例如：'img1'，請勿重複）
    //   2. src:      【跑馬燈平時顯示】的圖片路徑（例如：'img/跑馬燈圖.jpg'）
    //   3. hoverSrc: 【滑鼠懸停時顯示】的圖片路徑（選填，若未填寫，則懸停時維持原圖）
    //   4. url:      點擊圖片後會跳轉的連結網址（例如：'https://www.your-link.com'）
    //
    // 範例：
    //   - 新增圖片項目：在陣列結尾加上一個新物件，例如：
    //     { name: 'img10', src: 'img/new_src.jpg', hoverSrc: 'img/new_hover.jpg', url: 'https://example.com' }
    // ==========================================
    const imagesData = [
      { name: 'img1', src: 'img/517b7933f5d090793d5db12475c06_0.jpg', hoverSrc: 'https://tse1.mm.bing.net/th/id/OIP.pHAoxDKCV7bIR8OeFz3ZPQHaHa?cb=thfc1falcon2&rs=1&pid=ImgDetMain&o=7&rm=3', bgSrc: 'https://ibw.bwnet.com.tw/ac_gallery/2025/12/d9e67268-8f9a-5357-0b6e-a061603e20cb_620.jpg', url: 'https://www.google.com.tw/index.html' },
      { name: 'img2', src: 'img/62363999_10157567576533783_7706675654204325888_o-1_0.jpg', hoverSrc: 'https://tse1.mm.bing.net/th/id/OIP.pHAoxDKCV7bIR8OeFz3ZPQHaHa?cb=thfc1falcon2&rs=1&pid=ImgDetMain&o=7&rm=3', bgSrc: 'https://ibw.bwnet.com.tw/ac_gallery/2025/12/d9e67268-8f9a-5357-0b6e-a061603e20cb_620.jpg', url: 'https://www.google.com.tw/index.html' },
      { name: 'img3', src: 'img/images515_0.png', hoverSrc: 'https://tse1.mm.bing.net/th/id/OIP.pHAoxDKCV7bIR8OeFz3ZPQHaHa?cb=thfc1falcon2&rs=1&pid=ImgDetMain&o=7&rm=3', bgSrc: 'https://ibw.bwnet.com.tw/ac_gallery/2025/12/d9e67268-8f9a-5357-0b6e-a061603e20cb_620.jpg', url: 'https://www.google.com.tw/index.html' },
      { name: 'img4', src: 'img/images_0.png', hoverSrc: 'https://tse1.mm.bing.net/th/id/OIP.pHAoxDKCV7bIR8OeFz3ZPQHaHa?cb=thfc1falcon2&rs=1&pid=ImgDetMain&o=7&rm=3', bgSrc: 'https://ibw.bwnet.com.tw/ac_gallery/2025/12/d9e67268-8f9a-5357-0b6e-a061603e20cb_620.jpg', url: 'https://www.google.com.tw/index.html' },
      { name: 'img5', src: 'img/logo-uwtaiwan_0.jpg', hoverSrc: 'https://tse1.mm.bing.net/th/id/OIP.pHAoxDKCV7bIR8OeFz3ZPQHaHa?cb=thfc1falcon2&rs=1&pid=ImgDetMain&o=7&rm=3', bgSrc: 'https://ibw.bwnet.com.tw/ac_gallery/2025/12/d9e67268-8f9a-5357-0b6e-a061603e20cb_620.jpg', url: 'https://www.google.com.tw/index.html' },
      { name: 'img6', src: 'img/logo_0.jpg', hoverSrc: 'https://tse1.mm.bing.net/th/id/OIP.pHAoxDKCV7bIR8OeFz3ZPQHaHa?cb=thfc1falcon2&rs=1&pid=ImgDetMain&o=7&rm=3', bgSrc: 'https://ibw.bwnet.com.tw/ac_gallery/2025/12/d9e67268-8f9a-5357-0b6e-a061603e20cb_620.jpg', url: 'https://www.google.com.tw/index.html' },
      { name: 'img7', src: 'img/pngtree-line-chat-icon-png-image_3584855_0.jpg', hoverSrc: 'https://tse1.mm.bing.net/th/id/OIP.pHAoxDKCV7bIR8OeFz3ZPQHaHa?cb=thfc1falcon2&rs=1&pid=ImgDetMain&o=7&rm=3', bgSrc: 'https://ibw.bwnet.com.tw/ac_gallery/2025/12/d9e67268-8f9a-5357-0b6e-a061603e20cb_620.jpg', url: 'https://www.google.com.tw/index.html' },
      { name: 'img8', src: 'img/unnamed515_0.png', hoverSrc: 'https://tse1.mm.bing.net/th/id/OIP.pHAoxDKCV7bIR8OeFz3ZPQHaHa?cb=thfc1falcon2&rs=1&pid=ImgDetMain&o=7&rm=3', bgSrc: 'https://ibw.bwnet.com.tw/ac_gallery/2025/12/d9e67268-8f9a-5357-0b6e-a061603e20cb_620.jpg', url: 'https://www.google.com.tw/index.html' },
      { name: 'img9', src: 'img/淘寶網，標誌［2021年－］_0.jpg', hoverSrc: 'https://tse1.mm.bing.net/th/id/OIP.pHAoxDKCV7bIR8OeFz3ZPQHaHa?cb=thfc1falcon2&rs=1&pid=ImgDetMain&o=7&rm=3', bgSrc: 'https://ibw.bwnet.com.tw/ac_gallery/2025/12/d9e67268-8f9a-5357-0b6e-a061603e20cb_620.jpg', url: 'https://www.google.com.tw/index.html' }
    ];

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function generateGroupHtml(shuffled, isClone = false) {
      let html = `<div class="group" ${isClone ? 'aria-hidden="true"' : ''}>`;
      shuffled.forEach((img) => {
        if (img.hoverSrc) {
          html += `<a class="director-link has-hover" data-name="${img.name}" href="${img.url}" target="_blank" rel="noopener noreferrer"><img class="img-default" src="${img.src}" alt="" /><img class="img-hover" src="${img.hoverSrc}" alt="" /></a>`;
        } else {
          html += `<a class="director-link" data-name="${img.name}" href="${img.url}" target="_blank" rel="noopener noreferrer"><img src="${img.src}" alt="" /></a>`;
        }
        html += '<span class="sep">||</span>';
      });
      html += '</div>';
      return html;
    }

    function renderMarquees() {
      const tracks = document.querySelectorAll('.track');
      tracks.forEach((track) => {
        const shuffled = shuffle(imagesData);
        track.innerHTML = generateGroupHtml(shuffled, false) + generateGroupHtml(shuffled, true);
      });
    }

    // 渲染跑馬燈內容
    renderMarquees();

    const body = document.body;
    const hoverBgImage = document.querySelector('.hover-bg-image');
    let links = [];

    // 初始化事件綁定
    function initEvents() {
      links = [...document.querySelectorAll('.director-link')];

      links.forEach((link) => {
        link.addEventListener('mouseenter', () => activateDirector(link.dataset.name));
        link.addEventListener('focus', () => activateDirector(link.dataset.name));
      });
    }

    function activateDirector(name) {
      body.classList.add('is-hovering');

      // 尋找對應的背景圖，並動態設定
      const imgInfo = imagesData.find(img => img.name === name);
      if (imgInfo && imgInfo.bgSrc) {
        hoverBgImage.style.backgroundImage = `url('${imgInfo.bgSrc}')`;
      }

      // 切換跑馬燈圖片的 active 狀態
      links.forEach((link) => {
        link.classList.toggle('is-active', link.dataset.name === name);
      });
    }

    function clearDirector() {
      body.classList.remove('is-hovering');
      links.forEach((link) => link.classList.remove('is-active'));
    }

    // 初始化事件
    initEvents();

    document.querySelector('.marquee-wrap').addEventListener('mouseleave', clearDirector);
    document.querySelector('.marquee-wrap').addEventListener('focusout', (event) => {
      if (!event.currentTarget.contains(event.relatedTarget)) clearDirector();
    });
  </script>
</body>

</html>
