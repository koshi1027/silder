<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Directors | Marquee Hover Preview</title>

  <style>
    :root {
      --bg: #f1f1f1;
      --text: #000;
      --muted-text: rgba(0, 0, 0, .18);
      --active-text: #fff;
      --header-h: 112px;
      --speed-top: 58s;
      --speed-middle: 64s;
      --speed-bottom: 60s;
      --ease: cubic-bezier(.22, 1, .36, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background: var(--bg);
    }

    /* 滿版背景圖層 */
    .image-stage {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: #111;
      opacity: 0;
      transition: opacity .55s var(--ease);
    }

    body.is-hovering .image-stage {
      opacity: 1;
    }

    .director-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transform: scale(1.035);
      transition:
        opacity .65s var(--ease),
        transform 1.2s var(--ease);
    }

    .director-bg.is-active {
      opacity: 1;
      transform: scale(1);
    }

    .image-shade {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, .12);
    }

    /* Header */
    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 30;
      width: 100%;
      height: var(--header-h);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
      padding: 42px 76px 0;
      pointer-events: none;
    }

    .logo,
    .main-nav {
      pointer-events: auto;
    }

    .logo {
      grid-column: 1;
      justify-self: center;
      display: inline-flex;
      align-items: center;
      font-size: clamp(28px, 2.35vw, 42px);
      font-weight: 900;
      letter-spacing: -0.08em;
      line-height: 1;
      color: #191919;
      transform: translateX(8vw);
    }

    .logo span {
      display: inline-block;
    }

    .logo .yellow { color: #f4d800; }
    .logo .blue { color: #63a7ff; }
    .logo .pink { color: #ff4f9b; }

    .main-nav {
      grid-column: 3;
      justify-self: center;
      display: flex;
      gap: 70px;
      padding-top: 3px;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: -.02em;
      color: #000;
    }

    .main-nav a {
      position: relative;
      padding-bottom: 4px;
    }

    .main-nav a.is-active::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 1px;
      background: currentColor;
    }

    body.is-hovering .main-nav,
    body.is-hovering .logo {
      color: #111;
    }

    /* Marquee */
    .marquee-wrap {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 36px;
      padding-top: var(--header-h);
      mix-blend-mode: normal;
    }

    .marquee-row {
      width: 100%;
      overflow: visible;
      white-space: nowrap;
    }

    .track {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      will-change: transform;
      color: var(--text);
    }

    .group {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
    }

    .director-link,
    .sep {
      display: inline-block;
      font-size: clamp(64px, 6.35vw, 124px);
      font-weight: 800;
      letter-spacing: -0.065em;
      line-height: .9;
      color: currentColor;
    }

    .director-link {
      margin: 0 28px;
      cursor: pointer;
      transition:
        color .35s var(--ease),
        opacity .35s var(--ease),
        transform .35s var(--ease);
    }

    .sep {
      margin: 0 9px;
      font-weight: 400;
      letter-spacing: -.08em;
    }

    body.is-hovering .track {
      color: var(--muted-text);
    }

    body.is-hovering .director-link.is-active {
      color: var(--active-text);
      opacity: 1;
      transform: translateY(-2px);
      text-shadow: 0 8px 26px rgba(0, 0, 0, .16);
    }

    body.is-hovering .sep {
      color: rgba(0, 0, 0, .28);
    }

    .move-left {
      animation: moveLeft linear infinite;
    }

    .move-right {
      animation: moveRight linear infinite;
    }

    .speed-top { animation-duration: var(--speed-top); }
    .speed-middle { animation-duration: var(--speed-middle); }
    .speed-bottom { animation-duration: var(--speed-bottom); }

    @keyframes moveLeft {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    @keyframes moveRight {
      from { transform: translateX(-50%); }
      to { transform: translateX(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .track {
        animation: none !important;
      }
    }

    @media (max-width: 900px) {
      :root {
        --header-h: 120px;
      }

      .site-header {
        height: auto;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        padding: 28px 24px 0;
      }

      .logo {
        transform: none;
        font-size: 30px;
      }

      .main-nav {
        gap: 22px;
        font-size: 13px;
      }

      .marquee-wrap {
        gap: 24px;
      }

      .director-link,
      .sep {
        font-size: clamp(46px, 14vw, 82px);
      }

      .director-link {
        margin: 0 18px;
      }
    }
  </style>
</head>

  <script>
    const body = document.body;
    const links = [...document.querySelectorAll('.director-link')];
    const backgrounds = [...document.querySelectorAll('.director-bg')];

    function activateDirector(name) {
      body.classList.add('is-hovering');

      links.forEach((link) => {
        link.classList.toggle('is-active', link.dataset.name === name);
      });

      backgrounds.forEach((image) => {
        image.classList.toggle('is-active', image.dataset.name === name);
      });
    }

    function clearDirector() {
      body.classList.remove('is-hovering');
      links.forEach((link) => link.classList.remove('is-active'));
      backgrounds.forEach((image) => image.classList.remove('is-active'));
    }

    links.forEach((link) => {
      link.addEventListener('mouseenter', () => activateDirector(link.dataset.name));
      link.addEventListener('focus', () => activateDirector(link.dataset.name));
    });

    document.querySelector('.marquee-wrap').addEventListener('mouseleave', clearDirector);
    document.querySelector('.marquee-wrap').addEventListener('focusout', (event) => {
      if (!event.currentTarget.contains(event.relatedTarget)) clearDirector();
    });
  </script>
